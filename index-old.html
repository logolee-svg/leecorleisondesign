<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lee Corleison Design</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="frame">
    <nav class="top-nav">
      <a href="index.html" class="lcd-logo-link"><img class="lcd-logo" src="./images/lcdlogo.svg" alt="Lee Corleison Design Logo" /></a>
      <a href="index.html" class="lcd-typography">Lee Corleison<br>Design</a>
      <div class="lcd-nav-right">
        <button class="contact-btn">Contact me</button>
      </div>
    </nav>
    <div class="hero-container" id="heroContainer">
      <div class="hero-links">
        <a href="logos.html" class="hero-link">
          <span class="hero-link-text">Brand.</span>
          <div class="hero-link-preview" aria-hidden="true">
            <img class="swirl-logo" src="./images/1.svg" alt="" />
            <img class="swirl-logo" src="./images/3.svg" alt="" />
            <img class="swirl-logo" src="./images/5.svg" alt="" />
            <img class="swirl-logo" src="./images/7.svg" alt="" />
            <img class="swirl-logo" src="./images/9.svg" alt="" />
            <img class="swirl-logo" src="./images/14.svg" alt="" />
            <img class="swirl-logo" src="./images/17.svg" alt="" />
            <img class="swirl-logo" src="./images/19.svg" alt="" />
            <img class="swirl-logo" src="./images/23.svg" alt="" />
            <img class="swirl-logo" src="./images/27.svg" alt="" />
            <img class="swirl-logo" src="./images/-1.svg" alt="" />
            <img class="swirl-logo" src="./images/-4.svg" alt="" />
          </div>
        </a>
        <a href="product.html" class="hero-link">
          <span class="hero-link-text">Product.</span>
          <div class="hero-link-preview" aria-hidden="true">
            <img class="fan-card" src="./images/previews/geodde.png" alt="" />
            <img class="fan-card" src="./images/previews/palomagroup.png" alt="" />
            <img class="fan-card" src="./images/previews/authsignal.png" alt="" />
            <img class="fan-card" src="./images/previews/nextwork.png" alt="" />
          </div>
        </a>
        <a href="consult.html" class="hero-link">
          <span class="hero-link-text">Consult.</span>
          <div class="hero-link-preview"></div>
        </a>
      </div>
      <p class="hero-intro">Product architect from brand to full stack engineer.</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
